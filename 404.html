<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to index.html
    var path = window.location.pathname;
    var base = '/recommendations';
    var route = path.replace(base, '') || '/';
    sessionStorage.setItem('spa_redirect', route + window.location.search + window.location.hash);
    window.location.replace(base + '/');
  </script>
</head>
<body></body>
</html>
